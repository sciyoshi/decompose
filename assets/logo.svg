<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 180" role="img" aria-labelledby="title desc">
  <title id="title">decompose</title>
  <desc id="desc">A 2x2 grid of rounded tiles with one tile detaching, next to the wordmark "decompose".</desc>
  <style>
    .ink { fill: #0f1a1d; }
    .ink-stroke { stroke: #0f1a1d; }
    .bg { fill: #ffffff; }
    .accent { fill: #e8552b; }
    @media (prefers-color-scheme: dark) {
      .ink { fill: #e8eaed; }
      .ink-stroke { stroke: #e8eaed; }
      .bg { fill: #0d1117; }
    }
  </style>

  <g transform="translate(30,22)">
    <!-- 2x2 grid: three attached tiles, one detached -->
    <rect x="0"  y="72" width="60" height="60" rx="10" class="ink"/>
    <rect x="72" y="72" width="60" height="60" rx="10" class="ink"/>
    <rect x="0"  y="0"  width="60" height="60" rx="10" class="ink"/>
    <!-- Detached tile: translated up-right and rotated, filled with accent -->
    <g transform="translate(92,-14) rotate(14 30 30)">
      <rect x="0" y="0" width="60" height="60" rx="10" class="accent"/>
    </g>
  </g>

  <g transform="translate(210,124)">
    <text x="0" y="0"
          font-family="ui-rounded, 'SF Pro Rounded', Nunito, Inter, system-ui, -apple-system, Segoe UI, Arial, sans-serif"
          font-size="88"
          font-weight="800"
          letter-spacing="-2"
          class="ink">decompose</text>
  </g>
</svg>
