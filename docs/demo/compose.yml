processes:
  api:
    description: HTTP API server (colored logs)
    command: >
      while true; do
        printf '\033[32m%s INFO\033[0m  request served status=200 path=/healthz\n' "$(date +%H:%M:%S)";
        sleep 1;
        printf '\033[31m%s ERROR\033[0m upstream timeout retry=2\n' "$(date +%H:%M:%S)";
        sleep 2;
      done

  worker:
    description: Background job runner
    command: >
      while true; do
        printf '\033[36m%s worker\033[0m processed batch of 42 jobs\n' "$(date +%H:%M:%S)";
        sleep 2;
      done

  cache:
    description: Cache warmer
    command: >
      while true; do
        printf '\033[35m%s cache\033[0m refreshed keys=%s\n' "$(date +%H:%M:%S)" "$((RANDOM % 200))";
        sleep 3;
      done

  migrate:
    description: One-shot migration
    command: >
      for step in 001_init 002_users 003_index 004_sessions; do
        printf 'applying migration %s\n' "$step";
        sleep 1;
      done;
      printf '\033[32mmigrations complete\033[0m\n'
